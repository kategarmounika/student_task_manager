<!DOCTYPE html>
<html>
<head>
  <title>Calendar</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">📅 Task Calendar</h1>

<a href="/dashboard" class="text-blue-500 mb-4 inline-block">← Back</a>

{% if tasks|length == 0 %}
<p>No tasks found</p>
{% endif %}

<div class="space-y-4">

{% for task in tasks %}
<div class="bg-white p-4 rounded shadow">

  <h3 class="font-bold">{{ task.title }}</h3>

  <p class="text-gray-500">{{ task.description }}</p>

  <p class="text-sm mt-2">📅 {{ task.due_date }}</p>

  {% if task.status == 'Completed' %}
    <span class="text-green-600 text-sm">✔ Completed</span>
  {% else %}
    <span class="text-yellow-600 text-sm">⏳ Pending</span>
  {% endif %}

</div>
{% endfor %}

</div>

</body>
</html>
