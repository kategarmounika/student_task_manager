🚀 STEP 3: ADD THIS HTML
<!DOCTYPE html>
<html>
<head>
  <title>AI Task Suggestion</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">🤖 AI Task Suggestion</h1>

<!-- Input Form -->
<form method="POST" class="mb-6">
  <input type="text" name="topic" placeholder="Enter topic (exam, project...)"
    class="p-3 border rounded w-80" required>

  <button class="bg-purple-600 text-white px-4 py-2 rounded">
    Get Suggestions
  </button>
</form>

<!-- Suggestions -->
<div class="grid gap-4">

{% for s in suggestions %}
  <div class="bg-white p-4 rounded shadow">
    {{ s }}
  </div>
{% endfor %}

</div>

<br>

<a href="/dashboard"
class="bg-blue-500 text-white px-4 py-2 rounded">
⬅ Back to Dashboard
</a>

</body>
</html>
