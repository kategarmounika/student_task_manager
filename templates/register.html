<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gradient-to-r from-blue-500 to-purple-600">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h2 class="text-2xl font-bold text-center mb-6">Register</h2>

    <form method="POST">

      <input type="text" name="name" placeholder="Name" required
        class="w-full p-2 mb-4 border-b outline-none">

      <input type="email" name="email" placeholder="Email" required
        class="w-full p-2 mb-4 border-b outline-none">

      <input type="password" name="password" placeholder="Password" required
        class="w-full p-2 mb-4 border-b outline-none">

      <button type="submit"
        class="w-full bg-black text-white py-2 rounded-full">
        Sign Up
      </button>

    </form>

    <p class="text-center mt-4">
      Have an Account?
      <a href="/login" class="text-blue-500">Login Here</a>
    </p>

  </div>

</body>
</html>
