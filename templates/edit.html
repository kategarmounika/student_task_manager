<!DOCTYPE html>
<html>
<head>
  <title>Edit Task</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow w-96">

  <h2 class="text-xl font-bold mb-6 text-center">Edit Task</h2>

  <form method="POST">

    <input name="title" value="{{ task.title }}"
      class="w-full p-2 mb-3 border rounded" required>

    <input name="desc" value="{{ task.description }}"
      class="w-full p-2 mb-3 border rounded" required>

    <input type="date" name="due_date"
      value="{{ task.due_date }}"
      class="w-full p-2 mb-4 border rounded">

    <button class="bg-purple-600 text-white w-full py-2 rounded">
      Update Task
    </button>

  </form>

  <a href="/dashboard" class="block text-center mt-4 text-gray-500">
    ← Back to Dashboard
  </a>

</div>

</body>
</html>
