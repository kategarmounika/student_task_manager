<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h1 class="text-2xl font-bold mb-6">👤 User Profile</h1>

<div class="bg-white p-6 rounded-xl shadow w-full max-w-md">

  <p class="mb-2"><b>Name:</b> {{ user.name }}</p>
  <p class="mb-4"><b>Email:</b> {{ user.email }}</p>

  <hr class="my-4">

  <p>Total Tasks: {{ total }}</p>
  <p class="text-green-600">Completed: {{ completed }}</p>
  <p class="text-yellow-600">Pending: {{ pending }}</p>

</div>

<br>

<a href="/dashboard" class="bg-blue-500 text-white px-4 py-2 rounded">
⬅ Back to Dashboard
</a>

</body>
</html>
